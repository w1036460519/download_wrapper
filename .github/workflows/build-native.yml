name: Build download_wrapper

# 触发条件：改动源码/依赖/本工作流时构建；推送 v* 标签时构建并发布 Release；也支持手动触发
on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - 'vcpkg-triplets/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - 'vcpkg-triplets/**'
      - '.github/workflows/build-native.yml'
  workflow_dispatch:

env:
  # 固定 vcpkg 版本（发布 tag，可复现）；升级依赖时改这里即可
  # 注意：msys2 上游镜像会定期清理旧包，过老的 tag 会导致 pkgconfig 等 msys 依赖下载失败，
  # 需保持相对较新的 release tag
  VCPKG_REF: '2026.06.24'
  # 说明：vcpkg 的 x-gha 后端已于 2025 年 4 月随 GitHub Actions Cache API 变更被移除，
  # 故不再配置 VCPKG_BINARY_SOURCES。vcpkg 默认启用 files provider，将二进制归档写入
  # 各平台默认缓存目录，该目录由下方 actions/cache 步骤跨次构建持久化。

jobs:
  build:
    name: build-${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS：编译 arm64 + x86_64 后用 lipo 合并为单个 universal .dylib
          # bincache 为 vcpkg 默认二进制缓存目录，供 actions/cache 持久化
          - name: macos-universal
            os: macos-14
            triplet: ''            # 见下方 macOS 专用步骤，单独处理双 triplet
            output: libdownload_wrapper.dylib
            bincache: ~/.cache/vcpkg/archives
          # Linux 仅 x86_64
          - name: linux-x64
            os: ubuntu-24.04
            triplet: x64-linux
            output: libdownload_wrapper.so
            bincache: ~/.cache/vcpkg/archives
          # Windows 仅 x64（static-md：依赖静态链入 DLL，CRT 用系统动态运行时，产物自包含）
          - name: windows-x64
            os: windows-2022
            triplet: x64-windows-static-md
            output: download_wrapper.dll
            bincache: ~\AppData\Local\vcpkg\archives
          # iOS：真机 arm64 静态库（.a）。iOS 不允许加载未签名独立动态库，
          # 故编静态库并合并依赖为自包含胖库，随 Runner 链接
          - name: ios-arm64
            os: macos-14
            triplet: arm64-ios
            output: libdownload_wrapper.a
            bincache: ~/.cache/vcpkg/archives
          # Android：仅 arm64-v8a（NDK 交叉编译，.so 依赖静态链入自包含）
          - name: android-arm64-v8a
            os: ubuntu-24.04
            triplet: arm64-android
            output: libdownload_wrapper.so
            bincache: ~/.cache/vcpkg/archives

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 缓存 vcpkg 的二进制归档目录（files provider 默认写入该目录）；
      # 命中后 libtorrent/boost/openssl/curl 等重依赖无需重复编译。
      # key 绑定平台 + vcpkg 版本 + vcpkg.json 哈希，依赖或版本变动时自动失效，
      # restore-keys 提供退化匹配，保证部分依赖仍可复用。
      - name: Cache vcpkg binary archives
        uses: actions/cache@v5
        with:
          path: ${{ matrix.bincache }}
          key: vcpkg-${{ matrix.name }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.name }}-${{ env.VCPKG_REF }}-
            vcpkg-${{ matrix.name }}-

      # 手动 clone 并 bootstrap vcpkg，固定到 VCPKG_REF 发布 tag
      - name: Setup vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          cd "$RUNNER_TEMP/vcpkg"
          git checkout "$VCPKG_REF"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./bootstrap-vcpkg.bat -disableMetrics
          else
            ./bootstrap-vcpkg.sh -disableMetrics
          fi
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"

      # Linux 构建缺失的系统级依赖（libtorrent/boost 传递依赖需要）
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config

      # ---------- macOS：universal 单文件 ----------
      - name: Build (macOS universal)
        if: matrix.name == 'macos-universal'
        shell: bash
        run: |
          TOOLCHAIN="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          # 覆盖 triplet：将 vcpkg 依赖的 macOS 部署目标锁定到 12.0，
          # 与主库、App 一致，避免最终 dylib 的 minos 被抬到构建机 SDK 版本。
          export VCPKG_OVERLAY_TRIPLETS="$PWD/vcpkg-triplets"

          # arm64
          cmake -B build-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN"
          cmake --build build-arm64 --config Release

          # x86_64
          cmake -B build-x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DVCPKG_TARGET_TRIPLET=x64-osx \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN"
          cmake --build build-x64 --config Release

          # 合并为 universal binary
          mkdir -p dist
          lipo -create \
            build-arm64/libdownload_wrapper.dylib \
            build-x64/libdownload_wrapper.dylib \
            -output dist/libdownload_wrapper.dylib

          # strip 符号：Release 无调试信息但仍保留静态链入依赖的符号表。
          # -x 只去除本地符号，保留动态库加载必需的导出符号，最稳妥。
          echo "== strip 前 =="
          ls -l dist
          strip -x dist/libdownload_wrapper.dylib
          echo "== strip 后 =="
          ls -l dist

          echo "== universal binary 架构验证 =="
          lipo -info dist/libdownload_wrapper.dylib
          file dist/libdownload_wrapper.dylib

          echo "== 部署目标验证（各架构 minos 应为 12.0）=="
          otool -l dist/libdownload_wrapper.dylib | grep -A3 LC_BUILD_VERSION || true

      # ---------- Linux / Windows：单架构 ----------
      - name: Build (${{ matrix.name }})
        if: matrix.name == 'linux-x64' || matrix.name == 'windows-x64'
        shell: bash
        run: |
          TOOLCHAIN="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN"
          cmake --build build --config Release

          mkdir -p dist
          # 兼容不同平台产物目录（多配置生成器会输出到 Release/ 子目录）
          find build -name "${{ matrix.output }}" -exec cp {} dist/ \;

          # strip 符号：仅 Linux 的 .so 需手动裁剪（仍带静态链入依赖的符号表）；
          # Windows 符号已分离到 .pdb，.dll 本身无需 strip。
          if [ "${{ matrix.name }}" = "linux-x64" ]; then
            echo "== strip 前 =="
            ls -l dist
            strip --strip-unneeded dist/libdownload_wrapper.so
            echo "== strip 后 =="
          fi
          ls -l dist

      # ---------- iOS：真机 arm64 静态库，合并依赖为自包含胖静态库 ----------
      - name: Build (iOS arm64 static)
        if: matrix.name == 'ios-arm64'
        shell: bash
        run: |
          TOOLCHAIN="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DDW_BUILD_SHARED=OFF \
            -DVCPKG_TARGET_TRIPLET=arm64-ios \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN"
          cmake --build build --config Release

          mkdir -p dist
          # STATIC 库只含 download_wrapper 自身符号；需将 vcpkg 依赖（curl/libtorrent/boost/openssl）
          # 一并合并为自包含胖静态库，供 Runner 直接链接。
          SELF_LIB=$(find build -name "libdownload_wrapper.a" | head -1)
          DEP_LIB_DIR=$(find . -type d -path "*vcpkg_installed/arm64-ios/lib" | head -1)
          echo "self=$SELF_LIB deps=$DEP_LIB_DIR"
          libtool -static -o dist/libdownload_wrapper.a "$SELF_LIB" "$DEP_LIB_DIR"/*.a
          echo "== 静态库架构验证 =="
          lipo -info dist/libdownload_wrapper.a

      # ---------- Android：arm64-v8a 动态库（.so，依赖静态链入自包含）----------
      - name: Build (Android arm64-v8a)
        if: matrix.name == 'android-arm64-v8a'
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          echo "NDK=$ANDROID_NDK_HOME"
          TOOLCHAIN="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          NDK_TOOLCHAIN="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake"
          # 消费端项目必须显式 chainload NDK 工具链：triplet 只对构建依赖端口生效，
          # 主项目仍需通过 VCPKG_CHAINLOAD_TOOLCHAIN_FILE + ANDROID_ABI 切到 NDK clang/lld，
          # 否则会用宿主机 gcc/ld 链接 aarch64 静态库，报 "file in wrong format"
          #
          # API 级别对齐：curl(getifaddrs=API24)、boost.asio(aligned_alloc=API28) 等依赖
          # 客观要求 Android 最低 API 28，主项目 ANDROID_PLATFORM 必须与之一致；
          # 否则按 android-21 链接时 sysroot 缺这些符号，触发 undefined symbol 链接失败。
          # 注意：App 侧 download_app 的 minSdkVersion 需同步 >= 28。
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=arm64-android \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$NDK_TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28
          cmake --build build --config Release

          mkdir -p dist
          find build -name "libdownload_wrapper.so" -exec cp {} dist/ \;

          # strip 符号：NDK 直接输出的 .so 保留了完整符号表与 C++ 异常展开信息，
          # 加上静态链入的 libtorrent/boost/openssl/curl，未裁剪时体积可达数十 MB。
          # 正常 Gradle/AGP 打包 APK 时会自动 strip，此处取裸产物需手动裁剪，
          # 与其他平台产物体积对齐。
          STRIP=$(find "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt" -name 'llvm-strip' | head -1)
          echo "strip=$STRIP"
          echo "== strip 前 =="
          ls -l dist
          "$STRIP" --strip-unneeded dist/libdownload_wrapper.so
          echo "== strip 后 =="
          ls -l dist

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: download_wrapper-${{ matrix.name }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error

  # ========== 发布：推送 v* 标签时，汇总全平台产物并创建 GitHub Release ==========
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # 仅当推送 v* 标签时发布；日常 main push / PR 不触发
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # 使用内置 GITHUB_TOKEN 创建 Release，无需额外 token
    steps:
      # 下载所有平台的构建产物（每个 job 一个 artifact）
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      # 展平目录并重命名：避免不同平台同名 .so 相互覆盖（linux 与 android 均为 libdownload_wrapper.so）
      - name: Collect release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            plat=$(basename "$dir")            # 形如 download_wrapper-linux-x64
            for f in "$dir"*; do
              base=$(basename "$f")
              ext="${base##*.}"
              name="${base%.*}"
              # 以平台名作后缀区分，保证 Release 资产名唯一
              cp "$f" "release/${name}-${plat#download_wrapper-}.${ext}"
            done
          done
          echo "== 待发布资产 =="
          ls -l release

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
